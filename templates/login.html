{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 85vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card p-5 border-0 text-center" style="background: rgba(16, 18, 38, 0.85); backdrop-filter: blur(15px); border-radius: 20px; box-shadow: 0 0 40px rgba(0, 225, 255, 0.1) !important;">
            <div class="mb-4">
                <i class="fas fa-network-wired text-primary fs-1 mb-3 pulse-badge rounded-circle p-3 border border-secondary shadow-sm"></i>
                <h3 class="text-white fw-bold mb-1">CI/CD Auth Portal</h3>
                <p class="text-muted small">Sign in to monitor active pipelines</p>
            </div>
            
            {% if error %}
            <div class="alert alert-danger bg-danger text-white border-0 shadow-sm rounded-3 py-2">{{ error }}</div>
            {% endif %}
            
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-floating mb-3 text-start">
                    <input type="text" class="form-control bg-dark border-secondary text-white rounded-3 shadow-none focus-glow" id="username" name="username" placeholder="Username" required>
                    <label for="username" class="text-muted"><i class="fas fa-user text-primary me-2"></i> Username</label>
                </div>
                <div class="form-floating mb-4 text-start">
                    <input type="password" class="form-control bg-dark border-secondary text-white rounded-3 shadow-none focus-glow" id="password" name="password" placeholder="Password" required>
                    <label for="password" class="text-muted"><i class="fas fa-lock text-primary me-2"></i> Password</label>
                </div>
                
                <button type="submit" class="btn btn-outline-primary w-100 py-3 fw-bold fs-5 rounded-3 mb-3" style="letter-spacing: 1px;">SIGN IN</button>
            </form>
            
            <p class="text-muted mt-3 mb-0">Don't have an account? <a href="{{ url_for('signup') }}" class="text-primary text-decoration-none fw-bold ms-1" style="text-shadow: 0 0 10px rgba(0,225,255,0.4);">Sign Up</a></p>
        </div>
    </div>
</div>
{% endblock %}
